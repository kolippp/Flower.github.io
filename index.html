<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Shelter 2D Advanced</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5efe6;
}

.topbar {
  background:#e89d5b;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

canvas {
  display:block;
  margin:auto;
  background:#f7efe5;
}

.ui {
  padding:10px;
  text-align:center;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#e89d5b;
  color:white;
}
</style>
</head>

<body>

<div class="topbar" id="top">Day 1 | $100</div>
<canvas id="c" width="900" height="550"></canvas>

<div class="ui">
<button onclick="nextDay()">Next Day</button>
<button onclick="spawnCat()">Rescue Cat</button>
<button onclick="save()">Save</button>
<button onclick="load()">Load</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let game = {
  day:1,
  money:100,
  cats:[],
  selected:null,
  draggingFood:false,
  time:0,
  visitors:[],
};

function rand(a,b){return Math.random()*(b-a)+a}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

function createCat(){
  return {
    x:rand(100,700),
    y:rand(100,450),
    vx:rand(-1,1),
    vy:rand(-1,1),
    size:20,
    hunger:rand(50,80),
    happiness:rand(50,80),
    health:rand(50,90),
    clean:rand(50,80),
    name:"Cat"+Math.floor(Math.random()*1000),
    target:null
  }
}

function spawnCat(){
  if(game.cats.length<6){
    game.cats.push(createCat())
  }
}

function drawCat(c){
  ctx.save()
  ctx.translate(c.x,c.y)

  // body
  ctx.fillStyle="#f2b17a"
  ctx.beginPath()
  ctx.arc(0,0,c.size,0,Math.PI*2)
  ctx.fill()

  // eyes
  ctx.fillStyle="#000"
  ctx.beginPath()
  ctx.arc(-5,-2,2,0,6.28)
  ctx.arc(5,-2,2,0,6.28)
  ctx.fill()

  // ears
  ctx.beginPath()
  ctx.moveTo(-10,-10)
  ctx.lineTo(-5,-25)
  ctx.lineTo(0,-10)
  ctx.fill()

  ctx.beginPath()
  ctx.moveTo(10,-10)
  ctx.lineTo(5,-25)
  ctx.lineTo(0,-10)
  ctx.fill()

  ctx.restore()
}

function updateCats(){
  game.cats.forEach(c=>{
    if(c.target){
      let dx=c.target.x-c.x
      let dy=c.target.y-c.y
      let d=Math.hypot(dx,dy)

      if(d>3){
        c.vx=dx/d
        c.vy=dy/d
      } else {
        c.target=null
      }
    }

    c.x+=c.vx
    c.y+=c.vy

    if(c.x<50||c.x>850)c.vx*=-1
    if(c.y<50||c.y>500)c.vy*=-1

    // decay
    c.hunger-=0.02
    c.happiness-=0.01
    c.clean-=0.015

    if(c.hunger<30)c.health-=0.02

    c.hunger=clamp(c.hunger,0,100)
    c.happiness=clamp(c.happiness,0,100)
    c.health=clamp(c.health,0,100)
    c.clean=clamp(c.clean,0,100)
  })
}

function drawRoom(){
  // day/night
  let t=(Math.sin(game.time)+1)/2
  let light=200+50*t
  ctx.fillStyle=`rgb(${light},${light-20},${light-40})`
  ctx.fillRect(0,0,900,550)

  // zones
  ctx.fillStyle="#ffe0b3"
  ctx.fillRect(20,400,150,120)

  ctx.fillStyle="#cceeff"
  ctx.fillRect(700,20,150,120)

  ctx.fillStyle="#d4f5d4"
  ctx.fillRect(700,400,150,120)

  ctx.fillStyle="#f7d6f0"
  ctx.fillRect(350,20,200,100)
}

function drawVisitors(){
  game.visitors.forEach(v=>{
    ctx.fillStyle="#333"
    ctx.fillRect(v.x,v.y,20,40)

    v.x+=v.vx

    if(v.x>900){
      if(game.cats.length>0){
        let cat=game.cats[0]
        game.cats.splice(0,1)
        game.money+=50
      }
      v.remove=true
    }
  })

  game.visitors=game.visitors.filter(v=>!v.remove)
}

function spawnVisitor(){
  game.visitors.push({
    x:-20,
    y:300,
    vx:1.5
  })
}

function drawFood(){
  if(game.draggingFood){
    ctx.fillStyle="#d88c4a"
    ctx.beginPath()
    ctx.arc(mouse.x,mouse.y,10,0,6.28)
    ctx.fill()
  }
}

let mouse={x:0,y:0}

canvas.addEventListener("mousemove",e=>{
  mouse.x=e.offsetX
  mouse.y=e.offsetY
})

canvas.addEventListener("mousedown",()=>{
  game.draggingFood=true
})

canvas.addEventListener("mouseup",()=>{
  if(game.draggingFood){
    game.cats.forEach(c=>{
      let d=Math.hypot(c.x-mouse.x,c.y-mouse.y)
      if(d<60){
        c.hunger+=30
        c.target={x:mouse.x,y:mouse.y}
      }
    })
  }
  game.draggingFood=false
})

canvas.addEventListener("click",e=>{
  game.cats.forEach(c=>{
    let d=Math.hypot(c.x-e.offsetX,c.y-e.offsetY)
    if(d<25){
      game.selected=c
    }
  })
})

function drawUI(){
  document.getElementById("top").innerText=
  `Day ${game.day} | $${game.money} | Cats:${game.cats.length}`
}

function nextDay(){
  game.day++
  spawnVisitor()
}

function save(){
  localStorage.setItem("catgame",JSON.stringify(game))
}

function load(){
  let s=localStorage.getItem("catgame")
  if(s)game=JSON.parse(s)
}

function loop(){
  game.time+=0.01

  drawRoom()
  updateCats()

  game.cats.forEach(drawCat)
  drawVisitors()
  drawFood()

  drawUI()

  requestAnimationFrame(loop)
}

spawnCat()
spawnCat()
loop()
</script>

</body>
</html>
