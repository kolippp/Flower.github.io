      *{

      body{

      /* HERO VIDEO */
      
      header{

        overflow:hidden;
      }
      
      #bgvideo{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        object-fit:cover;
        z-index:-1;
      }
      
      .hero{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        background:rgba(0,0,0,0.5);
        padding:40px;
        border-radius:10px;
      }
      .hero h1{
        font-size:70px;
        letter-spacing:4px;
      }
      
      .hero p{
        font-size:22px;
        margin:10px 0 25px 0;
      }
      
      .button{
        display:inline-block;
        padding:12px 28px;
        background:#ff3c78;
        color:white;
        text-decoration:none;
        border-radius:30px;
        margin:8px;
        transition;0.3s;
      }
      
      .button:hover{
        background:#ff1a5c;
        transform:scale(1.05);
      }
      
      /* SECTIONS */

      /* ABOUT */

        margin:auto;
        line-height:1.7;
        color:#ccc;
      }
      
      /* GALLERY */
      
      .gallery{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
        gap:15px;
      }
      
      .gallery img{

        transition:0.4s;
      }
      
      .gallery img:hover{
